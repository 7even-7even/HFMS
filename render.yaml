databases:
  - name: cure-cafe-db
    databaseName: cure_cafe
    user: cure_cafe
    plan: free

services:
  - type: web
    name: cure-cafe
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run db:push -w apps/api && npm run db:seed -w apps/api && npm run build -w apps/web
    startCommand: npm run start -w apps/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: cure-cafe-db
          property: connectionString
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: CORS_ORIGIN
        value: "*"
      - key: APP_URL
        value: https://cure-cafe.onrender.com
      - key: UPLOAD_DIR
        value: uploads
      - key: EMAIL_VERIFICATION_TTL_MINUTES
        value: 60
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_FROM
        value: "Cure Cafe <no-reply@curecafe.local>"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

services:
  - type: web
    name: cure-cafe
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run db:push -w apps/api && npm run db:seed -w apps/api && npm run build -w apps/web
    startCommand: npm run start -w apps/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: CORS_ORIGIN
        value: "*"
      - key: APP_URL
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: EMAIL_VERIFICATION_TTL_MINUTES
        value: 60
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM_NAME
        value: Cure Cafe
      - key: EMAIL_FROM_EMAIL
        value: devloper7even@gmail.com
